<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audience — Elijah Bryant Admin</title>
  <link rel="stylesheet" href="/ask-elijah/admin/css/admin.css">
  <link rel="stylesheet" href="/ask-elijah/admin/css/audience.css">
</head>
<body>

  <div id="loading-screen">Verifying access…</div>

  <div class="app-shell" id="app-shell" style="display:none">

    <!-- SIDEBAR -->
    <nav class="sidebar">
      <div class="sidebar-logo"><svg viewBox="0 0 24 24" width="24" height="24" fill="none"><circle cx="4" cy="12" r="2.5" fill="#e8573a"/><circle cx="12" cy="12" r="2.5" fill="#e8573a"/><circle cx="20" cy="12" r="2.5" fill="#e8573a"/><line x1="6.5" y1="12" x2="9.5" y2="12" stroke="#e8573a" stroke-width="1.5"/><line x1="14.5" y1="12" x2="17.5" y2="12" stroke="#e8573a" stroke-width="1.5"/></svg></div>
      <a href="/ask-elijah/admin/" class="sidebar-icon" title="Discover">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>
      </a>
      <a href="/ask-elijah/admin/conversations.html" class="sidebar-icon" title="Chat">
        <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </a>
      <a href="/ask-elijah/admin/" class="sidebar-icon accent" title="Create">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="4"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      </a>
      <a href="/ask-elijah/admin/audience.html" class="sidebar-icon active" title="Audience">
        <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      </a>
      <div class="sidebar-spacer"></div>
      <button class="sidebar-icon" id="btn-more" title="More">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="1.5" fill="currentColor" stroke="none"/><circle cx="12" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="12" cy="19" r="1.5" fill="currentColor" stroke="none"/></svg>
      </button>
      <div class="sidebar-dropdown" id="sidebar-dropdown">
        <a class="sidebar-dropdown-item" href="/ask-elijah/admin/">Knowledge</a>
        <a class="sidebar-dropdown-item" href="/ask-elijah/admin/conversations.html">Conversations</a>
        <a class="sidebar-dropdown-item" href="/ask-elijah/admin/audience.html" style="color:#fff">Audience</a>
        <a class="sidebar-dropdown-item" href="/ask-elijah/admin/settings.html">Settings</a>
        <button class="sidebar-dropdown-item" onclick="adminLogout()">Log Out</button>
      </div>
    </nav>

    <!-- MAIN CONTENT -->
    <main class="main-content">

      <!-- Header -->
      <div class="dash-header">
        <div class="dash-header-left">
          <div class="header-avatar">EB</div>
          <div class="header-info">
            <span class="header-name">Elijah Bryant</span>
            <span class="header-title">Audience</span>
          </div>
        </div>
        <div class="aud-header-actions">
          <button class="aud-btn" id="aud-add-user">+ Add User</button>
          <button class="aud-btn secondary" id="aud-sync-crm">Sync CRM</button>
        </div>
      </div>

      <!-- Toolbar -->
      <div class="aud-toolbar">
        <div class="aud-stats" id="aud-stats"></div>
        <div class="aud-toolbar-right">
          <button class="toolbar-btn" id="aud-filter-btn" title="Filter">
            <svg viewBox="0 0 24 24"><line x1="4" y1="6" x2="20" y2="6"/><line x1="6" y1="12" x2="18" y2="12"/><line x1="8" y1="18" x2="16" y2="18"/></svg>
          </button>
          <button class="toolbar-btn" id="aud-search-btn" title="Search">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </button>
        </div>
      </div>

      <!-- Search bar -->
      <div class="search-bar" id="aud-search-bar">
        <input type="text" id="aud-search-input" placeholder="Search members…">
      </div>

      <!-- Filter bar -->
      <div class="aud-filter-bar" id="aud-filter-bar" style="display:none">
        <div style="position:relative">
          <button class="filter-chip" id="filter-status-aud">Status</button>
          <div class="filter-dropdown" id="aud-status-dropdown">
            <button class="filter-dropdown-item" onclick="audFilterStatus('active')">Active</button>
            <button class="filter-dropdown-item" onclick="audFilterStatus('inactive')">Inactive</button>
          </div>
        </div>
        <div style="position:relative">
          <button class="filter-chip" id="filter-tags">Tags</button>
        </div>
        <div style="position:relative">
          <button class="filter-chip" id="filter-messages">Messages</button>
        </div>
        <span class="filter-clear" id="aud-filter-clear">Clear</span>
      </div>

      <!-- Members table -->
      <div id="aud-content"></div>

    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/ask-elijah/admin/js/audience.js"></script>
</body>
</html>
