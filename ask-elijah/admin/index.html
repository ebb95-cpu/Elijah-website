<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Knowledge — Elijah Bryant Admin</title>
  <link rel="stylesheet" href="/ask-elijah/admin/css/admin.css">
</head>
<body>

  <!-- Loading / Auth gate -->
  <div id="loading-screen">Verifying access…</div>

  <!-- App shell -->
  <div class="app-shell" id="app-shell" style="display:none">

    <!-- ========== SIDEBAR ========== -->
    <nav class="sidebar">
      <div class="sidebar-logo">EB</div>

      <!-- Compass / Discover -->
      <button class="sidebar-icon" title="Discover">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>
      </button>

      <!-- Chat -->
      <button class="sidebar-icon" title="Chat">
        <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </button>

      <!-- + (accent) -->
      <button class="sidebar-icon accent" title="Create">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="4"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      </button>

      <!-- Person -->
      <button class="sidebar-icon active" title="Profile">
        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </button>

      <div class="sidebar-spacer"></div>

      <!-- More ··· -->
      <button class="sidebar-icon" id="btn-more" title="More">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="1.5" fill="currentColor" stroke="none"/><circle cx="12" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="12" cy="19" r="1.5" fill="currentColor" stroke="none"/></svg>
      </button>

      <!-- More dropdown -->
      <div class="sidebar-dropdown" id="sidebar-dropdown">
        <button class="sidebar-dropdown-item active">Knowledge</button>
        <button class="sidebar-dropdown-item">Voice</button>
        <button class="sidebar-dropdown-item">Audience</button>
        <button class="sidebar-dropdown-item">Insights</button>
        <button class="sidebar-dropdown-item">Settings</button>
        <button class="sidebar-dropdown-item">Get Help</button>
        <button class="sidebar-dropdown-item" onclick="adminLogout()">Log Out</button>
      </div>
    </nav>

    <!-- ========== MAIN CONTENT ========== -->
    <main class="main-content">

      <!-- Header -->
      <div class="dash-header">
        <div class="dash-header-left">
          <div class="header-avatar">EB</div>
          <div class="header-info">
            <span class="header-name">Elijah Bryant</span>
            <span class="header-title">Knowledge</span>
          </div>
        </div>
        <div class="word-count-pill" id="word-count">
          <strong>0</strong> of 1M words
        </div>
      </div>

      <!-- Tabs + Toolbar -->
      <div class="tabs-toolbar">
        <div class="tabs">
          <button class="tab active" data-tab="content">Content</button>
          <button class="tab" data-tab="feeds">Feeds</button>
        </div>
        <div class="toolbar">
          <!-- List -->
          <button class="toolbar-btn active" id="btn-list" title="List view">
            <svg viewBox="0 0 24 24"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg>
          </button>
          <!-- Grid -->
          <button class="toolbar-btn" id="btn-grid" title="Grid view">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          </button>

          <div class="toolbar-divider"></div>

          <!-- Settings -->
          <button class="toolbar-btn" title="Settings">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          </button>
          <!-- Filter -->
          <button class="toolbar-btn" title="Filter">
            <svg viewBox="0 0 24 24"><line x1="4" y1="6" x2="20" y2="6"/><line x1="6" y1="12" x2="18" y2="12"/><line x1="8" y1="18" x2="16" y2="18"/></svg>
          </button>
          <!-- Search -->
          <button class="toolbar-btn" id="btn-search" title="Search">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </button>

          <!-- + Add -->
          <div style="position:relative">
            <button class="toolbar-add-btn" id="btn-add" title="Add">+</button>
            <div class="add-dropdown" id="add-dropdown">
              <button class="add-dropdown-item" id="add-item">
                <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Add
              </button>
              <button class="add-dropdown-item" id="add-folder">
                <svg viewBox="0 0 24 24" stroke="#3b82f6"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                Folder
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Search bar (hidden by default) -->
      <div class="search-bar" id="search-bar">
        <input type="text" id="search-input" placeholder="Search knowledge items…">
      </div>

      <!-- Filter chips -->
      <div class="filter-bar">
        <div style="position:relative">
          <button class="filter-chip" id="filter-status">
            <span class="filter-dot green"></span>Status · Completed
          </button>
          <div class="filter-dropdown" id="status-dropdown"></div>
        </div>

        <div style="position:relative">
          <button class="filter-chip" id="filter-type">Content Type</button>
          <div class="filter-dropdown" id="type-dropdown"></div>
        </div>

        <span class="filter-clear" id="filter-clear">Clear</span>
      </div>

      <!-- Content area (list or grid rendered here) -->
      <div id="content-area"></div>

    </main>

    <!-- ========== DETAIL SIDE PANEL ========== -->
    <aside class="detail-panel" id="detail-panel">
      <div class="detail-panel-header">
        <button class="detail-close-btn" id="detail-close">&times;</button>
        <div class="detail-panel-actions">
          <button class="detail-action-btn" id="detail-retry" style="display:none">Retry</button>
          <button class="detail-action-btn" id="detail-edit">Edit</button>
        </div>
      </div>
      <div class="detail-panel-body" id="detail-body"></div>
    </aside>
  </div>

  <!-- ========== ADD/EDIT MODAL ========== -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-title" id="modal-title">Add Content</div>
      <div class="modal-type-tabs" id="modal-type-tabs"></div>
      <div id="modal-fields"></div>
      <div class="modal-actions">
        <button class="btn-save" id="modal-save">Save</button>
        <button class="btn-cancel" id="modal-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Supabase CDN (single load, shared with main app) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/ask-elijah/admin/js/knowledge.js"></script>
</body>
</html>
